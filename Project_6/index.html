<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laundary Mart</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="img">
          <img src="image.png" alt="Laundary image" />
        </div>
        <div class="form-right">
          <form class="frm">
            <h1 class="heading">Hello Again!</h1>
            <p class="para1">Welcome back! we missed you!</p>
            <p class="para2">Email</p>
            <input
              class="email-box"
              type="email"
              placeholder="Emailid@site.com" />
            <p class="para3">Password</p>
            <input
              class="passward-box"
              type="password"
              placeholder="Password" />
            <p class="para5">Forgot Password</p>
            <button class="btn">Login</button>
            <p class="para4">Not a member? <span>Register Now</span></p>
          </form>
        </div>
      </div>
    </header>
  </body>
</html>
